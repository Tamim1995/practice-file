<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8fafc;
      --muted: #b8c7d9;
      --panel: rgba(11, 18, 32, 0.72);
      --line: rgba(255, 255, 255, 0.18);
      --coral: #ff6b6b;
      --mint: #51e5b4;
      --gold: #ffd166;
      --blue: #4dabf7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 107, 107, 0.35), transparent 28rem),
        radial-gradient(circle at 80% 25%, rgba(81, 229, 180, 0.28), transparent 26rem),
        linear-gradient(135deg, #111827 0%, #182235 45%, #271a2f 100%);
    }

    .stage {
      position: relative;
      width: min(92vw, 820px);
      padding: 6rem 2rem;
      text-align: center;
    }

    .glow-ring {
      position: absolute;
      inset: 50%;
      width: min(82vw, 520px);
      aspect-ratio: 1;
      translate: -50% -50%;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 50%;
      background: conic-gradient(from 180deg, var(--coral), var(--gold), var(--mint), var(--blue), var(--coral));
      filter: blur(28px);
      opacity: 0.48;
      animation: drift 9s linear infinite;
    }

    .card {
      position: relative;
      z-index: 1;
      padding: clamp(2rem, 7vw, 4.5rem);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(20px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin: 0 0 1.2rem;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .spark {
      width: 0.75rem;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--mint);
      box-shadow: 0 0 20px var(--mint);
    }

    h1 {
      margin: 0;
      font-size: clamp(3.4rem, 13vw, 8.5rem);
      line-height: 0.92;
      letter-spacing: 0;
    }

    h1 span {
      display: block;
      background: linear-gradient(90deg, #ffffff, #ffd166 36%, #51e5b4 68%, #d7ecff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    p {
      max-width: 34rem;
      margin: 1.5rem auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      line-height: 1.7;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-top: 2rem;
    }

    a {
      min-width: 9.5rem;
      padding: 0.9rem 1.2rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: var(--ink);
      font-weight: 800;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.08);
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    a:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.52);
      background: rgba(255, 255, 255, 0.15);
    }

    a.primary {
      color: #08111f;
      background: var(--gold);
      border-color: transparent;
    }

    @keyframes drift {
      to {
        rotate: 360deg;
      }
    }

    @media (max-width: 520px) {
      body {
        overflow: auto;
      }

      .stage {
        padding: 2rem 1rem;
      }

      .card {
        padding: 2.25rem 1.1rem;
      }

      a {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Hello World welcome page">
    <div class="glow-ring" aria-hidden="true"></div>
    <section class="card">
      <div class="eyebrow"><span class="spark"></span> First page online</div>
      <h1>Hello <span>World</span></h1>
      <p>A tiny HTML file dressed up with glass, glow, motion, and a little bit of confidence.</p>
      <div class="button-row">
        <a class="primary" href="#">Get Started</a>
        <a href="#">Explore</a>
      </div>
    </section>
  </main>
</body>
</html>
